<!DOCTYPE html>
<html lang="sv">
<head>
<script>document.write('<meta name="viewport" content="width=device-width,initial-scale=1">')</script>
  <meta charset="UTF-8">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --parchment: #F7F4EE;
      --white:     #FFFFFF;
      --ink:       #0F1B2D;
      --slate:     #556070;
      --mist:      #96A3B0;
      --amber:     #D4880A;
      --fog:       #DDD8D0;
      --crimson:   #B52020;
      --emerald:   #1A7A4A;
    }

    body {
      font-family: 'Google Sans', Arial, sans-serif;
      font-size: 13px;
      background: var(--parchment);
      color: var(--ink);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: var(--ink);
      padding: 12px 14px 10px;
      flex-shrink: 0;
    }
    .header-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--mist);
      margin-bottom: 2px;
    }
    .header-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--parchment);
    }

    .elevlista {
      flex: 1;
      overflow-y: auto;
      padding: 8px 10px;
    }

    .elev-rad {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--white);
      border: 1px solid var(--fog);
      border-radius: 6px;
      padding: 7px 9px;
      margin-bottom: 4px;
      cursor: pointer;
      transition: border-color 0.1s;
    }
    .elev-rad:hover { border-color: var(--slate); }

    .elev-namn {
      flex: 0 0 160px;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .betyg-select {
      border: none;
      outline: none;
      border-radius: 5px;
      width: 40px;
      height: 28px;
      text-align: center;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }
    .grade-A  { background: #C8F0D8; color: #1A6B35; }
    .grade-C  { background: #D8EEC8; color: #2A6020; }
    .grade-E  { background: #E8F5DC; color: #3A7030; }
    .grade-F  { background: #FFD0CC; color: #C02010; }
    .grade-da { background: #F0EDE6; color: #96A3B0; }

    textarea {
      width: 100%;
      border: 1px solid var(--fog);
      border-radius: 5px;
      padding: 6px 8px;
      font-size: 12px;
      font-family: inherit;
      color: var(--ink);
      background: var(--white);
      resize: vertical;
      line-height: 1.4;
    }
    textarea::placeholder { color: var(--mist); }

    .spara-rad {
      padding: 10px 12px;
      background: var(--white);
      border-top: 1px solid var(--fog);
      flex-shrink: 0;
    }
    .spara-knapp {
      width: 100%;
      padding: 9px;
      background: var(--ink);
      color: var(--parchment);
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .spara-knapp:disabled { opacity: 0.6; cursor: default; }
    .spara-knapp.sparat { background: var(--emerald); }
    .status-text {
      font-size: 11px;
      color: var(--mist);
      text-align: center;
      margin-top: 5px;
    }
    .status-text.fel { color: var(--crimson); }

    .mail-knapp {
      width: 100%;
      margin-top: 10px;
      padding: 8px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid var(--fog);
      border-radius: 6px;
      background: var(--parchment);
      color: var(--slate);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .mail-knapp:hover:not(:disabled) { background: var(--ink); color: var(--parchment); border-color: var(--ink); }
    .mail-knapp:disabled { opacity: 0.6; cursor: default; }
    .mail-knapp.skickat { background: var(--emerald); color: #fff; border-color: var(--emerald); }
    .mail-knapp.fel { background: #FDEAEA; color: var(--crimson); border-color: #E8AAAA; }

    .oversikt-wrap {
      flex: 1;
      overflow: auto;
      padding: 8px 10px;
    }
    .oversikt-tabell {
      border-collapse: collapse;
      table-layout: fixed;
      width: 75vw;
      min-width: 600px;
    }
    .oversikt-tabell thead th {
      position: sticky;
      top: 0;
      background: var(--white);
      z-index: 1;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--mist);
      padding: 4px 3px 6px;
      text-align: center;
      border-bottom: 2px solid var(--fog);
      white-space: nowrap;
    }
    .oversikt-tabell th.namn-kol,
    .oversikt-tabell td.namn-cell {
      position: sticky;
      left: 0;
      background: var(--white);
      z-index: 2;
    }
    .oversikt-tabell th.namn-kol {
      text-align: left;
      width: 170px;
      padding-right: 10px;
      z-index: 3;
    }
    .oversikt-tabell td {
      padding: 2px 1px;
      border-bottom: 1px solid var(--fog);
      text-align: center;
    }
    .oversikt-tabell td.namn-cell {
      text-align: left;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
      padding-right: 10px;
      color: var(--ink);
      cursor: pointer;
    }
    .oversikt-tabell td.namn-cell:hover { color: var(--amber); }
    .oversikt-tabell .betyg-select {
      width: 90%;
      height: 26px;
      font-size: 12px;
    }
    .oversikt-tabell th.intern-kol { width: 480px; text-align: left; padding-left: 6px; }
    .oversikt-tabell td.intern-cell { padding: 2px 4px; }
    .intern-cell textarea {
      width: 100%;
      font-size: 11px;
      padding: 3px 5px;
      border: 1px solid var(--fog);
      border-radius: 4px;
      background: #FFFBF0;
      resize: none;
      font-family: inherit;
      color: #A07800;
      line-height: 1.3;
      height: 46px;
    }
    .intern-cell textarea:focus { border-color: var(--amber); outline: none; background: #fff; }
    .oversikt-tabell tbody tr:hover td { background: #F0EDE6; }
    .oversikt-tabell tbody tr:hover td.namn-cell { background: #F0EDE6; }
    .oversikt-tabell tbody tr:hover td.intern-cell { background: #FFFBF0; }
    .fokus-aktiv tr { transition: opacity 0.22s, filter 0.22s; }
    .fokus-aktiv tr:not(.fokus-elev) { opacity: 0.08; filter: blur(3px); pointer-events: none; user-select: none; }
    .oversikt-kom-rad td {
      background: #FFFBF0;
      padding: 8px 10px;
      border-bottom: 2px solid var(--fog);
    }
    .oversikt-kom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .oversikt-kom-block { display: flex; flex-direction: column; gap: 3px; }
    .oversikt-kom-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--mist);
    }
    .oversikt-kom-rad textarea {
      font-size: 11px;
      padding: 4px 6px;
      border: 1px solid var(--fog);
      border-radius: 4px;
      background: var(--white);
      resize: vertical;
      font-family: inherit;
      color: var(--ink);
      line-height: 1.4;
    }
    .oversikt-legend {
      margin-top: 8px;
      font-size: 10px;
      color: var(--mist);
      line-height: 1.7;
    }
    .oversikt-legend span { display: inline-block; margin-right: 10px; }

    .laddar {
      text-align: center;
      padding: 40px 0;
      color: var(--mist);
      font-size: 13px;
    }

    @media (max-width: 600px) {
      .oversikt-tabell { width: 100%; min-width: unset; table-layout: auto; }
      .oversikt-tabell th.intern-kol { width: 120px; }
      .oversikt-tabell th, .oversikt-tabell td { font-size: 11px; padding: 3px 2px; }
      .oversikt-tabell th.namn-kol { width: 100px; }
      .oversikt-tabell .betyg-select { width: 36px; font-size: 11px; }
      .intern-cell textarea { height: 36px; font-size: 10px; }
      .spara-knapp { font-size: 14px; padding: 12px; }
      .header-title { font-size: 14px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-label">Historia · Vt 2026</div>
  <div class="header-title">Betygspanel</div>
</div>

<div id="app">
  <div class="laddar">Laddar elevdata…</div>
</div>

<script>
var state = {
  elever: [],
  uppgifter: [],
  expanderadElev: null,
  sparar: false,
  sparatOk: false,
  felmeddelande: '',
  skickatMejl: {},
};

google.script.run
  .withSuccessHandler(function(data) {
    if (data.fel) { visaFel(data.fel); return; }
    state.elever    = data.elever;
    state.uppgifter = data.uppgifter;
    render();
  })
  .withFailureHandler(function(err) { visaFel(err.message); })
  .hamtaElevdata();

function render() {
  var oldWrap = document.querySelector('.oversikt-wrap');
  var savedScroll = oldWrap ? oldWrap.scrollTop : 0;

  var app = document.getElementById('app');
  app.innerHTML = '';
  app.style.display = 'flex';
  app.style.flexDirection = 'column';
  app.style.flex = '1';
  app.style.overflow = 'hidden';

  renderVyOversikt(app);
  renderSparaRad(app);

  var newWrap = document.querySelector('.oversikt-wrap');
  if (newWrap) newWrap.scrollTop = savedScroll;
}

function renderVyOversikt(app) {
  var wrap = el('div', { className: 'oversikt-wrap' });
  var tbl  = el('table', { className: 'oversikt-tabell' });

  var thead = el('thead');
  var hr    = el('tr');
  var th0   = el('th', { className: 'namn-kol' }); th0.textContent = 'Elev'; hr.appendChild(th0);
  state.uppgifter.forEach(function(u, i) {
    var th = el('th'); th.textContent = 'Prov ' + (i + 1); th.title = u; hr.appendChild(th);
  });
  var thIntern = el('th', { className: 'intern-kol' }); thIntern.textContent = '🔒 Intern'; hr.appendChild(thIntern);
  thead.appendChild(hr);
  tbl.appendChild(thead);

  var tbody = el('tbody');
  if (state.expanderadElev !== null) tbody.className = 'fokus-aktiv';
  var kolAntal = state.uppgifter.length + 2;

  state.elever.forEach(function(elev, idx) {
    var expanderad = state.expanderadElev === idx;

    var tr = el('tr');
    if (expanderad) tr.className = 'fokus-elev';
    var td0 = el('td', { className: 'namn-cell' });
    td0.textContent = (expanderad ? '▾ ' : '▸ ') + elev.namn;
    td0.addEventListener('click', function() {
      state.expanderadElev = expanderad ? null : idx;
      render();
    });
    tr.appendChild(td0);

    elev.betyg.forEach(function(b, i) {
      var td = el('td');
      td.appendChild(betygSelect(b, function(val) { state.elever[idx].betyg[i] = val; delete state.skickatMejl[idx]; }));
      tr.appendChild(td);
    });

    var tdIntern = el('td', { className: 'intern-cell' });
    var internTa = el('textarea');
    internTa.placeholder = '–';
    internTa.value = elev.internKommentar || '';
    internTa.addEventListener('click', function(e) { e.stopPropagation(); });
    internTa.addEventListener('input', function() { state.elever[idx].internKommentar = this.value; delete state.skickatMejl[idx]; });
    tdIntern.appendChild(internTa);
    tr.appendChild(tdIntern);

    tbody.appendChild(tr);

    if (expanderad) {
      var komTr = el('tr', { className: 'oversikt-kom-rad fokus-elev' });
      var komTd = el('td'); komTd.colSpan = kolAntal;
      var grid  = el('div', { className: 'oversikt-kom-grid' });

      state.uppgifter.forEach(function(u, i) {
        var block = el('div', { className: 'oversikt-kom-block' });
        var lbl   = el('div', { className: 'oversikt-kom-label' }); lbl.textContent = 'Prov ' + (i + 1) + ' – ' + u; block.appendChild(lbl);
        var ta    = el('textarea'); ta.rows = 2; ta.placeholder = 'Kommentar…';
        ta.value  = elev.kommentar[i] || '';
        ta.addEventListener('input', function() { state.elever[idx].kommentar[i] = this.value; delete state.skickatMejl[idx]; });
        block.appendChild(ta);
        grid.appendChild(block);
      });

      var harSkickat = !!state.skickatMejl[idx];
      var mailBtn = el('button', { className: 'mail-knapp' + (harSkickat ? ' skickat' : '') });
      mailBtn.textContent = harSkickat ? '✓ Resultatmejl skickat' : '📧 Skicka resultatmejl';
      (function(e, btn, elevIdx) {
        btn.addEventListener('click', function(ev) {
          ev.stopPropagation();
          btn.disabled = true; btn.textContent = 'Skickar…'; btn.className = 'mail-knapp';
          google.script.run
            .withSuccessHandler(function(namn) {
              state.skickatMejl[elevIdx] = true;
              render();
            })
            .withFailureHandler(function(err) {
              btn.textContent = '⚠ ' + err.message; btn.className = 'mail-knapp fel'; btn.disabled = false;
            })
            .skickaMailTillElev(e.radIndex);
        });
      })(elev, mailBtn, idx);
      var mailBlock = el('div', { className: 'oversikt-kom-block' });
      mailBlock.style.gridColumn = '1 / -1';
      mailBlock.appendChild(mailBtn);
      grid.appendChild(mailBlock);

      komTd.appendChild(grid);
      komTr.appendChild(komTd);
      tbody.appendChild(komTr);
    }
  });
  tbl.appendChild(tbody);
  wrap.appendChild(tbl);

  var legend = el('div', { className: 'oversikt-legend' });
  state.uppgifter.forEach(function(u, i) {
    var s = el('span'); s.textContent = 'Prov ' + (i + 1) + ' = ' + u; legend.appendChild(s);
  });
  wrap.appendChild(legend);
  app.appendChild(wrap);
}

function renderSparaRad(app) {
  var rad = el('div', { className: 'spara-rad' });
  var btn = el('button', { className: 'spara-knapp' + (state.sparatOk ? ' sparat' : '') });
  btn.textContent = state.sparar ? 'Sparar…' : (state.sparatOk ? '✓ Sparat!' : 'Spara till Sheet');
  btn.disabled = state.sparar;
  btn.addEventListener('click', sparaAlla);
  rad.appendChild(btn);

  var st = el('div', { className: 'status-text' + (state.felmeddelande ? ' fel' : '') });
  st.textContent = state.felmeddelande || (state.elever.length + ' elever · ' + state.uppgifter.length + ' uppgifter');
  rad.appendChild(st);
  app.appendChild(rad);
}

function sparaAlla() {
  state.sparar = true; state.felmeddelande = ''; render();
  google.script.run
    .withSuccessHandler(function() {
      state.sparar = false; state.sparatOk = true; render();
      setTimeout(function() { state.sparatOk = false; render(); }, 2500);
    })
    .withFailureHandler(function(err) {
      state.sparar = false; state.felmeddelande = 'Fel: ' + err.message; render();
    })
    .sparaAllaElever(state.elever);
}

function el(tag, props) {
  var e = document.createElement(tag);
  if (props) Object.keys(props).forEach(function(k) { e[k] = props[k]; });
  return e;
}

function gradeKlass(g) {
  if (g === 'A') return 'grade-A';
  if (g === 'C') return 'grade-C';
  if (g === 'E') return 'grade-E';
  if (g === 'F') return 'grade-F';
  return 'grade-da';
}

function betygSelect(value, onChange) {
  var sel = el('select', { className: 'betyg-select ' + gradeKlass(value) });
  ['–','F','E','C','A'].forEach(function(b) {
    var opt = el('option'); opt.value = b; opt.textContent = b;
    if (b === value) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', function(e) {
    e.stopPropagation();
    sel.className = 'betyg-select ' + gradeKlass(this.value);
    onChange(this.value);
  });
  return sel;
}

function visaFel(msg) {
  document.getElementById('app').innerHTML = '<div style="padding:20px;color:#B52020;font-size:13px;">⚠ ' + msg + '</div>';
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && state.expanderadElev !== null) {
    state.expanderadElev = null;
    render();
  }
});
</script>
</body>
</html>
