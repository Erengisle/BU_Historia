<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <title>Anmälan till omprov – Historia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      background: #f0f0f0;
      font-family: system-ui, Arial, sans-serif;
    }

    .container {
      max-width: 800px;
      min-height: 45vh;
      margin: 16px auto;
      padding: 24px;
      background: white;
      border-radius: 18px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.15);
    }

    h1 {
      text-align: center;
      font-size: 28px;
    }

    label {
      display: block;
      margin-top: 18px;
      font-size: 18px;
      font-weight: 600;
    }

    input, select {
      width: 100%;
      padding: 14px;
      font-size: 18px;
      margin-top: 6px;
      border-radius: 12px;
      border: 1px solid #bbb;
    }

    button {
      width: 100%;
      margin-top: 24px;
      padding: 16px;
      font-size: 20px;
      font-weight: 700;
      background: #1565C0;
      color: white;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.1s;
    }

    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.6; }

    #status {
      margin-top: 16px;
      font-size: 17px;
      font-weight: 600;
      text-align: center;
    }

    .hint {
      margin-top: 10px;
      font-size: 15px;
      color: #555;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Anmälan till omprov – Historia</h1>

    <form id="form">
      <label>E-postadress</label>
      <input type="email" id="email" required>

      <label>Datum</label>
      <input type="date" id="date" required>
      <div class="hint">Endast möjliga onsdagar är valbara</div>

      <label>Vilket prov?</label>
      <select id="exam" required>
        <option value="">Välj prov</option>
        <option>Första världskriget</option>
        <option>Mellankrigstiden</option>
        <option>Andra världskriget</option>
        <option>Europa efter världskrigen</option>
        <option>Sverige efter världskrigen</option>
        <option>Världen efter världskrigen</option>
      </select>

      <button id="submitBtn">Skicka anmälan</button>
    </form>

    <div id="status"></div>

    <div class="hint">
      Omprov genomförs onsdagar kl. 14:45 – 16:15
    </div>
  </div>

<script>
  const dateInput = document.getElementById("date");

  // Blockera tidigare datum
  const today = new Date();
  today.setHours(0,0,0,0);
  dateInput.min = today.toISOString().split("T")[0];

  const blockedWeeks = [1, 2, 9, 15];
  function isBlockedWeek(w) {
    return blockedWeeks.includes(w) || (w >= 23 && w <= 38);
  }

  function isoWeek(d) {
    d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
    const day = d.getUTCDay() || 7;
    d.setUTCDate(d.getUTCDate() + 4 - day);
    const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
    return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  }

  function nextValidWednesday(fromDate) {
    const d = new Date(fromDate);
    while (true) {
      d.setDate(d.getDate() + 1);
      if (d.getDay() === 3 && !isBlockedWeek(isoWeek(d))) {
        return d;
      }
    }
  }

  dateInput.addEventListener("change", () => {
    const chosen = new Date(dateInput.value);

    if (chosen.getDay() !== 3 || isBlockedWeek(isoWeek(chosen))) {
      const next = nextValidWednesday(chosen);
      dateInput.value = next.toISOString().split("T")[0];
      alert("Ogiltigt datum. Närmaste möjliga onsdag har valts automatiskt.");
    }
  });
</script>
</body>
</html>
